<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Ector.V Multi-Model Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>Ector.V - 모델 선택</header>

  <main id="main-container">  
    <!-- 초기 화면: 모델 선택 -->  
    <section id="model-selection">  
      <h2>사용할 모델을 선택하세요</h2>  
      <ul>  
        <li><button data-model="flexi" data-url="https://yuchan5386-flexiapi.hf.space/generate">Flexi</button></li>  
        <li><button data-model="keralux" data-url="https://yuchan5386-keralux-api.hf.space/generate">KeraLux</button></li>
        <li><button data-model="interactgpt" data-url="https://yuchan5386-interactgpt-api.hf.space/generate">InteractGPT</button></li>
      </ul>  
    </section>  

    <!-- 설명 모달 -->  
    <section id="model-description">  
      <div class="modal-bg"></div>  
      <div class="modal-content">  
        <h3 id="model-name"></h3>  
        <p id="model-desc"></p>  
        <button id="start-chat-btn">채팅 시작</button>  
        <button id="cancel-btn">취소</button>  
      </div>  
    </section>  

    <!-- 채팅 UI (초기엔 숨김) -->  
    <section id="chat-ui" style="display:none;">  
      <header id="chat-header"></header>  
      <div id="chat-container" style="overflow-y:auto; height:60vh; padding: 1rem;"></div>  
      <footer>  
        <input type="text" id="prompt" placeholder="메시지를 입력하세요" autocomplete="off" />  
        <button id="send-btn">전송</button>  
        <button id="back-btn">모델 선택으로 돌아가기</button>  
      </footer>  
    </section>  
  </main>  

  <script src="script.js"></script>
</body>
</html>
