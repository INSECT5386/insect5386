<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Kossistant Chat</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #userInput {
            width: 400px;
            padding: 12px 16px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            margin-bottom: 12px;
            background-color: #1e1e1e;
            color: #fff;
        }

        #sendBtn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #03dac6;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        #sendBtn:hover {
            background-color: #018786;
        }

        #response {
            margin-top: 20px;
            width: 80%;
            max-width: 600px;
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 16px;
            white-space: pre-wrap;
            line-height: 1.6;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body>
    <input id="userInput" type="text" placeholder="질문을 입력하세요" />
    <button id="sendBtn">보내기</button>
    <div id="response"></div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        (async () => {
            const client = await Client.connect("Yuchan5386/Kossistant-1");

            const sendMessage = async () => {
                const userInput = document.querySelector("#userInput").value;
                if (!userInput.trim()) return;

                const result = await client.predict("/chat_respond", [userInput]);
                document.querySelector("#response").innerHTML = result.data[0].replace(/\n/g, "<br>");
            };

            document.querySelector("#sendBtn").addEventListener("click", sendMessage);
            document.querySelector("#userInput").addEventListener("keypress", (e) => {
                if (e.key === "Enter") sendMessage();
            });
        })();
    </script>
</body>
</html>
