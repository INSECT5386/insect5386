<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Multi-Model Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Multi-Model Chat</h1>
  </header>

  <main id="main-container">  
    <section id="chat-ui">  
      <div id="chat-header" class="chat-header">
        모델을 선택하거나 메시지를 입력하세요.
      </div>  

      <div id="chat-container" class="chat-container" style="overflow-y: auto; height: 60vh; padding: 1rem;"></div>  

      <footer class="chat-footer">  
        <div class="input-wrapper">
          <input
            type="text"
            id="prompt"
            placeholder="Flexi, KeraLux, InteractGPT 중 선택하거나 메시지를 입력하세요."
            autocomplete="off"
            aria-label="메시지 입력"
          />  

          <!-- 여긴 추천 텍스트가 동적으로 들어가는 영역 (초기엔 비어있어야 함!) -->
          <div id="model-suggestions" class="suggestions"></div>
        </div>

        <button id="send-btn" aria-label="메시지 전송">전송</button>  
      </footer>  

      <!-- 모델 선택 버튼은 따로 아래에 배치! -->
      <div class="model-buttons" style="margin-top: 1rem;">
        <button class="model-button" data-model="Flexi">Flexi</button>
        <button class="model-button" data-model="KeraLux">KeraLux</button>
        <button class="model-button" data-model="InteractGPT">InteractGPT</button>
      </div>
    </section>  
  </main>  

  <script src="script.js"></script>
</body>
</html>
