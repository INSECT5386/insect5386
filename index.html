<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Ector.V Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6c63ff" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="2icon-192.png" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    body {
      display: flex;
      flex-direction: column;
      background: radial-gradient(ellipse at bottom, #0d1b2a 0%, #000000 100%);
      background-attachment: fixed;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
      opacity: 0.2;
      z-index: 0;
    }

    header {
      background: linear-gradient(90deg, #121212 0%, #1a1a1a 100%);
      color: #eee;
      padding: 1rem;
      font-size: 1.5rem;
      text-align: center;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 10px rgba(108, 99, 255, 0.3);
      text-shadow: 0 0 8px rgba(108, 99, 255, 0.7);
      user-select: none;
      font-weight: 600;
      letter-spacing: 1.2px;
    }

    #chat-container {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 1;
      position: relative;
    }

    .message {
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      max-width: 85%;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.5;
      backdrop-filter: blur(6px);
      background: rgba(255, 255, 255, 0.1);
      color: #e6e6fa;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    .user {
      align-self: flex-end;
      background: rgba(108, 99, 255, 0.2);
      border: 1px solid rgba(108, 99, 255, 0.4);
    }

    .bot {
      align-self: flex-start;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    footer {
      display: flex;
      padding: 0.75rem;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.6);
      border-top: 1px solid #444;
      z-index: 1;
      position: relative;
    }

    input[type="text"] {
      flex: 1;
      font-size: 1rem;
      padding: 0.75rem;
      border: 1px solid #666;
      border-radius: 0.5rem;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      backdrop-filter: blur(4px);
    }

    button {
      font-size: 1rem;
      padding: 0.75rem 1rem;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      background: #554ce3;
    }

    @media (max-width: 600px) {
      header {
        font-size: 1.2rem;
      }
      .message {
        max-width: 100%;
        font-size: 0.95rem;
      }
      button {
        padding: 0.75rem;
      }
    }
  </style>
</head>
<body>

  <header>Ector.V</header>

  <main id="chat-container"></main>

  <footer>
    <input type="text" id="prompt" placeholder="메시지를 입력하세요" />
    <button onclick="sendMessage()">전송</button>
  </footer>

  <script>
    const chatContainer = document.getElementById("chat-container");
    const promptInput = document.getElementById("prompt");
    const button = document.querySelector("button");

    async function sendMessage() {
      const prompt = promptInput.value.trim();
      if (!prompt) return;

      const userMessage = document.createElement("div");
      userMessage.className = "message user";
      userMessage.textContent = prompt;
      chatContainer.appendChild(userMessage);

      const botMessage = document.createElement("div");
      botMessage.className = "message bot";
      chatContainer.appendChild(botMessage);

      chatContainer.scrollTop = chatContainer.scrollHeight;
      promptInput.value = "";
      button.disabled = true;

      botMessage.textContent = `『 "${prompt}" 에 대한 응답을 생성합니다... 』\n\n`;

      const url = "https://yuchan5386-interactgpt-api.hf.space/generate";
      const params = new URLSearchParams({ prompt });

      try {
        const response = await fetch(`${url}?${params}`);
        if (!response.body) throw new Error("No response body");

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");

        let isFirstChunk = true;
        while (true) {
          const { done, value } = await reader.read();
          if (done) {
            botMessage.textContent += "\n[✔️ 완료]";
            break;
          }

          const text = decoder.decode(value, { stream: true });

          if (isFirstChunk && text.startsWith(prompt)) {
            botMessage.textContent += text.slice(prompt.length).trimStart();
          } else {
            botMessage.textContent += text;
          }

          isFirstChunk = false;
          chatContainer.scrollTop = chatContainer.scrollHeight;
        }
      } catch (err) {
        botMessage.textContent = `[❌ 오류 발생] ${err.message}`;
      } finally {
        button.disabled = false;
      }
    }

    promptInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("./service-worker.js")
        .then(() => console.log("✅ 서비스워커 등록됨"))
        .catch((err) => console.error("❌ 서비스워커 실패:", err));
    }
  </script>

</body>
</html>
