<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Multi-Model Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>Multi-Model Chat</header>

  <main id="main-container">  
    <section id="chat-ui">  
      <header id="chat-header">모델을 선택하거나 메시지를 입력하세요.</header>  
      <div id="chat-container" style="overflow-y:auto; height:60vh; padding: 1rem;"></div>  
      <footer>  
        <div class="input-wrapper">
          <input type="text" id="prompt" placeholder="Flexi, KeraLux, InteractGPT 중 선택하거나 메시지를 입력하세요." autocomplete="off" />  
          <div id="model-suggestions" class="suggestions">
            <button class="model-button" data-model="Flexi">Flexi</button>
<button class="model-button" data-model="KeraLux">KeraLux</button>
<button class="model-button" data-model="InteractGPT">InteractGPT</button>

            </div>
        </div>
        <button id="send-btn">전송</button>  
        </footer>  
    </section>  
  </main>  

  <script src="script.js"></script>
</body>
</html>
