<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Kossistant Chat</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
        }

        #response-container {
            margin-bottom: 20px;
            padding: 16px;
            background-color: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            white-space: pre-wrap;
            line-height: 1.6;
            color: #e0e0e0;
            font-size: 14px;
            flex-grow: 1;  /* 응답 영역이 충분히 크도록 확장 */
        }

        .input-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #userInput {
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #1e1e1e;
            color: #fff;
            transition: background-color 0.3s ease;
        }

        #userInput:focus {
            outline: none;
            background-color: #333;
        }

        #sendBtn {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #03dac6;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        #sendBtn:hover {
            background-color: #018786;
            transform: scale(1.05);
        }

        #sendBtn:active {
            transform: scale(0.95);
        }

        /* 반응형 디자인 */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 16px;
            }

            #userInput, #sendBtn {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="response-container"></div>
        <div class="input-container">
            <input id="userInput" type="text" placeholder="질문을 입력하세요" />
            <button id="sendBtn">보내기</button>
        </div>
    </div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
        (async () => {
            const client = await Client.connect("Yuchan5386/Kossistant-1");

            const sendMessage = async () => {
                const userInput = document.querySelector("#userInput").value;
                if (!userInput.trim()) return;

                const result = await client.predict("/chat_respond", [userInput]);
                document.querySelector("#response-container").innerHTML = result.data[0].replace(/\n/g, "<br>");
            };

            document.querySelector("#sendBtn").addEventListener("click", sendMessage);
            document.querySelector("#userInput").addEventListener("keypress", (e) => {
                if (e.key === "Enter") sendMessage();
            });
        })();
    </script>
</body>
</html>
