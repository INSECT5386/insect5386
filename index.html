<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>InteractGPT 실시간 스트리밍</title>
  <style>
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #f4f4f4;
      padding: 40px;
      color: #222;
    }
    #output {
      white-space: pre-wrap;
      border: 1px solid #ccc;
      padding: 20px;
      margin-top: 20px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      min-height: 100px;
    }
    #textbox {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #aaa;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #444;
    }
  </style>
  <script type="module">
    import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/+esm";

    let client;

    window.onload = async () => {
      client = await Client.connect("Yuchan5386/InteractGPT");
    };

    window.sendMessage = async function () {
      const input = document.getElementById("textbox").value;
      const output = document.getElementById("output");
      output.innerHTML = "⏳ 응답 생성 중...";

      try {
        const stream = await client.stream("/chat_stream", {
          user_input: input,
          history_html: ""
        });

        output.innerHTML = "";
        for await (const token of stream) {
          output.innerHTML = token.data[0]; // 스트리밍된 HTML 누적
        }
      } catch (err) {
        console.error(err);
        output.innerText = "❌ 오류 발생!";
      }
    };
  </script>
</head>
<body>

  <h1>💬 InteractGPT (토큰 스트리밍)</h1>

  <input id="textbox" type="text" placeholder="무엇이든 물어보세요!">
  <button onclick="sendMessage()">보내기</button>

  <div id="output">여기에 InteractGPT 응답이 표시됩니다.</div>

</body>
</html>
