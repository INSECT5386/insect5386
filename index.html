<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kossistant Chat</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Kossistant Chat</h1>
            <p>궁금한 점을 물어보세요!</p>
        </header>

        <div class="chat-box" id="chatBox">
            <!-- 메시지가 이곳에 표시됩니다. -->
        </div>

        <div class="input-area">
            <input id="userInput" type="text" placeholder="질문을 입력하세요" />
            <button id="sendBtn">보내기</button>
        </div>

        <footer>
            <p>© 2025 Kossistant, 모든 권리 보유.</p>
        </footer>
    </div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        (async () => {
            const client = await Client.connect("Yuchan5386/Kossistant-1");

            const sendMessage = async () => {
                const userInputEl = document.querySelector("#userInput");
                const userInput = userInputEl.value;
                if (!userInput.trim()) return;

                // 유저 메시지 화면에 표시
                const userMessageDiv = document.createElement('div');
                userMessageDiv.classList.add('message', 'user');
                const userBubble = document.createElement('div');
                userBubble.classList.add('bubble', 'user-bubble');
                userBubble.textContent = userInput;
                userMessageDiv.appendChild(userBubble);
                document.querySelector("#chatBox").appendChild(userMessageDiv);

                // Gradio 예측 요청
                const result = await client.predict("/chat_respond", [userInput]);
                console.log("Gradio 응답:", result);

                // 응답 데이터에서 봇 메시지만 추출
                let botReply = result.data;
                if (Array.isArray(botReply)) {
                    botReply = botReply.at(-1);  // 마지막 항목이 챗봇 응답이라고 가정
                }

                // 챗봇 메시지 표시 (중복 div 방지)
                const botMessageDiv = document.createElement('div');
                botMessageDiv.classList.add('message', 'bot');
                const botBubble = document.createElement('div');
                botBubble.classList.add('bubble', 'bot-bubble');
                botBubble.textContent = botReply;
                botMessageDiv.appendChild(botBubble);
                document.querySelector("#chatBox").appendChild(botMessageDiv);

                // 스크롤 아래로
                const chatBox = document.querySelector("#chatBox");
                chatBox.scrollTop = chatBox.scrollHeight;

                // 입력창 초기화
                userInputEl.value = '';
            };

            document.querySelector("#sendBtn").addEventListener("click", sendMessage);
            document.querySelector("#userInput").addEventListener("keypress", (e) => {
                if (e.key === "Enter") sendMessage();
            });
        })();
    </script>
</body>
</html>
