<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Ector.V Multi-Model Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>

  <header>Ector.V - 모델 선택</header>

  <main id="main-container">
    <!-- 초기 화면: 모델 선택 -->
    <section id="model-selection">
      <h2>사용할 모델을 선택하세요</h2>
      <ul>
        <li><button data-model="Interactgpt" data-url="https://yuchan5386-interactgpt-api.hf.space/generate">InteractGPT</button></li>
        <li><button data-model="flexi" data-url="https://example.com/keralux-api/generate">Flexi</button></li>
        <li><button data-model="keralux" data-url="https://example.com/flexi-api/generate">KeraLux</button></li>
      </ul>
    </section>

    <!-- 채팅 UI (초기엔 숨김) -->
    <section id="chat-ui" style="display:none;">
      <header id="chat-header"></header>
      <div id="chat-container" style="height: 60vh; overflow-y: auto; border: 1px solid #ccc; padding: 1rem; margin-bottom: 1rem;"></div>
      <footer>
        <input type="text" id="prompt" placeholder="메시지를 입력하세요" />
        <button id="send-btn">전송</button>
        <button id="back-btn">모델 선택으로 돌아가기</button>
      </footer>
    </section>
  </main>

  <script>
    const modelSelection = document.getElementById('model-selection');
    const chatUI = document.getElementById('chat-ui');
    const chatHeader = document.getElementById('chat-header');
    const chatContainer = document.getElementById('chat-container');
    const promptInput = document.getElementById('prompt');
    const sendBtn = document.getElementById('send-btn');
    const backBtn = document.getElementById('back-btn');

    let selectedModel = null;
    let apiUrl = null;

    // 모델 선택 버튼 이벤트
    modelSelection.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedModel = btn.dataset.model;
        apiUrl = btn.dataset.url;

        chatHeader.textContent = `Ector.V - ${selectedModel} 모델 채팅`;
        modelSelection.style.display = 'none';
        chatUI.style.display = 'block';

        chatContainer.innerHTML = '';  // 초기화
        promptInput.value = '';
        promptInput.focus();
      });
    });

    // 모델 선택 화면으로 돌아가기
    backBtn.addEventListener('click', () => {
      selectedModel = null;
      apiUrl = null;

      chatUI.style.display = 'none';
      modelSelection.style.display = 'block';

      chatContainer.innerHTML = '';
      promptInput.value = '';
    });

    // 메시지 전송 함수
    async function sendMessage() {
      const prompt = promptInput.value.trim();
      if (!prompt) return;

      // 유저 메시지 표시
      const userMessage = document.createElement('div');
      userMessage.className = 'message user';
      userMessage.textContent = prompt;
      chatContainer.appendChild(userMessage);

      // 봇 메시지 자리 만들기
      const botMessage = document.createElement('div');
      botMessage.className = 'message bot';
      botMessage.textContent = `『 "${prompt}" 에 대한 응답을 생성 중... 』\n\n`;
      chatContainer.appendChild(botMessage);

      chatContainer.scrollTop = chatContainer.scrollHeight;
      promptInput.value = '';
      sendBtn.disabled = true;

      try {
        const params = new URLSearchParams({ prompt });
        const response = await fetch(`${apiUrl}?${params}`);

        if (!response.body) throw new Error("응답 바디가 없습니다.");

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");

        let isFirstChunk = true;
        while (true) {
          const { done, value } = await reader.read();
          if (done) {
            botMessage.textContent += "\n[✔️ 완료]";
            break;
          }

          const text = decoder.decode(value, { stream: true });

          if (isFirstChunk && text.startsWith(prompt)) {
            botMessage.textContent += text.slice(prompt.length).trimStart();
          } else {
            botMessage.textContent += text;
          }
          isFirstChunk = false;
          chatContainer.scrollTop = chatContainer.scrollHeight;
        }
      } catch (err) {
        botMessage.textContent = `[❌ 오류 발생] ${err.message}`;
      } finally {
        sendBtn.disabled = false;
        promptInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    promptInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>

</body>
</html>
