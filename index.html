<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Kossistant 챗봇</title>
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
    }
    #chat-container {
      max-width: 600px;
      margin: auto;
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .message {
      margin: 10px 0;
      padding: 8px 12px;
      border-radius: 10px;
      max-width: 80%;
      word-wrap: break-word;
    }
    .user {
      background: #d9eaff;
      text-align: right;
      margin-left: auto;
    }
    .bot {
      background: #f3f3f3;
      text-align: left;
      margin-right: auto;
    }
    #chat {
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      padding: 10px 20px;
      background: #0055aa;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-left: 10px;
    }
    #input-area {
      display: flex;
    }
  </style>
</head>
<body>

<div id="chat-container">
  <h2>Kossistant 챗봇</h2>
  <div id="chat"></div>
  <div id="input-area">
    <input type="text" id="userInput" placeholder="메시지를 입력하세요..." />
    <button onclick="send()">전송</button>
  </div>
</div>

<script type="module">
  import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

  const client = await Client.connect("Yuchan5386/Kossistant-1");
  const chat = document.getElementById("chat");
  let history = [];

  async function send() {
    const input = document.getElementById("userInput");
    const userMessage = input.value.trim();
    if (!userMessage) return;

    // 화면에 사용자 메시지 출력
    addMessage("user", userMessage);

    // history에 추가
    history.push([userMessage, null]);
    input.value = "";

    // 챗봇 응답 요청
    const result = await client.predict("/chat_respond", {
      message: userMessage,
      history: history
    });

    const botReply = result.data[1];

    // 응답 저장 및 출력
    history[history.length - 1][1] = botReply;
    addMessage("bot", botReply);
  }

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  window.send = send;
</script>

</body>
</html>
