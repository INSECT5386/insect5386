<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kossistant Chat</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Kossistant</h1>
            <p>당신만의 AI 어시스턴트</p>
        </header>

        <div class="chat-box" id="chatBox">
            <!-- 여기에 대화 내용이 추가됩니다 -->
            <!-- 예시 -->
            <!-- <div class="user-msg">사용자: 안녕!</div> -->
            <!-- <div class="bot-msg">코시스턴트: 안녕하세요! 무엇을 도와드릴까요?</div> -->
        </div>

        <div class="input-area">
            <input id="userInput" type="text" placeholder="질문을 입력하세요" />
            <button id="sendBtn">보내기</button>
        </div>

        <footer>
            <p>&copy; 2025 Kossistant. 모든 권리 보유.</p>
        </footer>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
